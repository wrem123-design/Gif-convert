appId: com.spriteforge.desktop
productName: Sprite Studio
electronVersion: 31.7.7
directories:
  output: release
icon: build/icon.ico
files:
  - dist/main/**/*
  - dist/renderer/**/*
  - package.json
asar: true
asarUnpack:
  - dist/main/processorWorkerBootstrap.js
win:
  icon: build/icon.ico
  signAndEditExecutable: false
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
