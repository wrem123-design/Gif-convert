appId: com.spriteforge.desktop
productName: Sprite Forge
electronVersion: 31.7.7
directories:
  output: release
files:
  - dist/main/**/*
  - dist/renderer/**/*
  - package.json
asar: true
win:
  signAndEditExecutable: false
  target:
    - nsis
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
